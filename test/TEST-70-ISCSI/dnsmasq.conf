dhcp-leasefile=/run/dnsmasq.leases
log-debug
#log-dhcp
log-facility=-
no-hosts
no-ping
no-resolv
user=root
group=root
pid-file=

# net50
interface=enx525400123456
tag-if=set:net50,tag:enx525400123456
dhcp-range=tag:net50,192.168.50.150,192.168.50.250,255.255.255.0
dhcp-option=tag:net50,option:domain-name,net50.test
dhcp-option=tag:net50,option:tftp-server,192.168.50.1

dhcp-host=52:54:00:12:34:00,tag:net50,set:iscsi-0,192.168.50.101,iscsi-0
dhcp-option=tag:iscsi-0,option:root-path,"iscsi:192.168.50.1:::1:iqn.2009-06.dracut:target0"

# net51
interface=enx525400123457
tag-if=set:net51,tag:enx525400123457
dhcp-range=tag:net51,192.168.51.150,192.168.51.250,255.255.255.0
dhcp-option=tag:net51,option:domain-name,net51.test
dhcp-option=tag:net51,option:tftp-server,192.168.51.1

dhcp-host=52:54:00:12:34:01,tag:net51,set:iscsi-1,192.168.51.101,iscsi-1
dhcp-option=tag:iscsi-1,option:root-path,"iscsi:192.168.51.1:::1:iqn.2009-06.dracut:target1"
