dhcp-leasefile=/run/dnsmasq.leases
log-debug
#log-dhcp
log-facility=-
no-hosts
no-ping
no-resolv
user=root
group=root
pid-file=

# net50
interface=enx525400123456
tag-if=set:net50,tag:enx525400123456
dhcp-range=tag:net50,192.168.50.200,192.168.50.250,255.255.255.0
dhcp-option=tag:net50,option:domain-name,net50.test
dhcp-option=tag:net50,option:tftp-server,192.168.50.1

dhcp-host=52:54:00:12:34:00,tag:net50,set:nbd-0,192.168.50.100,nbd-0

dhcp-host=52:54:00:12:34:01,tag:net50,set:nbd-1,192.168.50.101,nbd-1
dhcp-option=tag:nbd-1,option:root-path,"nbd:192.168.50.1:raw"

dhcp-host=52:54:00:12:34:02,tag:net50,set:nbd-2,192.168.50.102,nbd-2
dhcp-option=tag:nbd-2,option:root-path,"nbd:192.168.50.1:raw:ext2"

dhcp-host=52:54:00:12:34:03,tag:net50,set:nbd-3,192.168.50.103,nbd-3
dhcp-option=tag:nbd-3,option:root-path,"nbd:192.168.50.1:raw::errors=panic"

dhcp-host=52:54:00:12:34:04,tag:net50,set:nbd-4,192.168.50.104,nbd-4
dhcp-option=tag:nbd-4,option:root-path,"nbd:192.168.50.1:raw:ext2:errors=panic"

# Use the encrypted image
dhcp-host=52:54:00:12:34:05,tag:net50,set:nbd-5,192.168.50.105,nbd-5
dhcp-option=tag:nbd-5,option:root-path,"nbd:192.168.50.1:encrypted:ext2:errors=panic"
