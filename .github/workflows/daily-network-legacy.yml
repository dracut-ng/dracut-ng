---
name: Daily Tests - network-legacy

on:  # yamllint disable-line rule:truthy
    schedule:
        - cron: '30 22 * * *'   # every day at 22:30 UTC

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

    pull_request:
        paths:
            - '.github/workflows/daily-network-legacy.yml'

jobs:
    network-legacy:
        name: >
            ${{ matrix.test }} on ${{ matrix.container }}
            ${{ matrix.network }} networking on ${{ matrix.architecture.tag }}
        runs-on: ${{ matrix.architecture.runner }}
        timeout-minutes: ${{ matrix.architecture.timeout }}
        concurrency:
            group: >
                daily-network-legacy-${{ github.workflow }}-${{ github.ref }}
                -${{ matrix.container }}-${{ matrix.test }}
                -${{ matrix.network }}-${{ matrix.architecture.tag }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                architecture:
                    - {runner: 'ubuntu-24.04', tag: 'amd', timeout: 20}
                    - {runner: 'ubuntu-24.04-arm', tag: 'arm', timeout: 60}
                network:
                    - network-legacy
                container:
                    - opensuse:latest
                    - gentoo:latest
                test:
                    - "50"
                    - "60"
                    - "72"
                exclude:
                    - container: gentoo:latest
                      test: "72"
        container:
            image: ghcr.io/dracut-ng/${{ matrix.container }}
            options: '--device=/dev/kvm --privileged'
        steps:
            - name: "Checkout Repository"
              uses: actions/checkout@v6
            - name: "${{ matrix.container }} TEST-${{ matrix.test }}"
              run: >
                USE_NETWORK=${{ matrix.network }} CONFIGURE_ARG='--enable-network-legacy'
                ./test/test-container.sh "TEST-${{ matrix.test }}" ${{ matrix.test }}
